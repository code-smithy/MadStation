<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MadStation UI MVP</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #0e1116; color: #e8edf3; }
    header { padding: 12px 16px; border-bottom: 1px solid #2a3340; display: flex; gap: 16px; align-items: center; }
    main { display: grid; grid-template-columns: 1fr 340px; gap: 12px; padding: 12px; }
    #grid { white-space: pre; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; line-height: 1.05; font-size: 11px; overflow: auto; border: 1px solid #2a3340; padding: 10px; background:#07090d; min-height: 70vh; }
    .panel { border: 1px solid #2a3340; padding: 10px; background: #131922; }
    .panel h3 { margin: 0 0 8px 0; }
    label { display:block; font-size: 12px; margin-top: 8px; }
    input, select, button { width: 100%; box-sizing: border-box; margin-top: 4px; padding: 6px; background:#0b1118; color:#e8edf3; border:1px solid #344254; }
    button { cursor: pointer; }
    #log { white-space: pre-wrap; font-size: 12px; max-height: 200px; overflow:auto; background:#0b1118; padding: 8px; border:1px solid #2a3340; }
    .muted { color: #98a6b8; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <strong>MadStation Frontend MVP (Phase 7A)</strong>
    <span id="conn" class="muted">WS: connecting...</span>
    <span id="tick" class="muted">tick: --</span>
  </header>

  <main>
    <section id="grid" aria-label="world grid"></section>

    <aside>
      <div class="panel">
        <h3>Status</h3>
        <div id="status" class="muted">loading...</div>
      </div>

      <div class="panel" style="margin-top:10px">
        <h3>Build / Deconstruct</h3>
        <label>X<input id="x" type="number" min="0" max="49" value="20"></label>
        <label>Y<input id="y" type="number" min="0" max="49" value="20"></label>
        <label>Tile
          <select id="tile">
            <option>Floor</option><option>Wall</option><option>Door</option><option>Airlock</option><option>Window</option>
          </select>
        </label>
        <button id="btnBuild">Send Build</button>
        <button id="btnDeconstruct">Send Deconstruct</button>
      </div>

      <div class="panel" style="margin-top:10px">
        <h3>Create Work Order</h3>
        <label>Work Type
          <select id="workType">
            <option>MineIce</option><option>HaulItem</option><option>RefineIce</option><option>FeedOxygenGenerator</option>
          </select>
        </label>
        <button id="btnWork">Send CreateWorkOrder</button>
      </div>

      <div class="panel" style="margin-top:10px">
        <h3>Event Log</h3>
        <div id="log"></div>
      </div>
    </aside>
  </main>

  <script>
    const gridEl = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const connEl = document.getElementById('conn');
    const tickEl = document.getElementById('tick');
    const logEl = document.getElementById('log');

    const randId = () => Math.random().toString(36).slice(2, 10);
    const val = (id) => document.getElementById(id).value;

    let ws;

    function appendLog(obj) {
      const line = typeof obj === 'string' ? obj : JSON.stringify(obj);
      logEl.textContent = `${new Date().toLocaleTimeString()} ${line}\n` + logEl.textContent;
      logEl.textContent = logEl.textContent.slice(0, 6000);
    }

    function tileChar(t) {
      if (t === 'Vacuum') return ' ';
      if (t === 'Floor') return '.';
      if (t === 'Wall') return '#';
      if (t === 'Door') return 'D';
      if (t === 'Airlock') return 'A';
      if (t === 'Window') return 'W';
      return '?';
    }

    async function refreshWorld() {
      const resp = await fetch('/world');
      const payload = await resp.json();
      const world = payload.world;
      tickEl.textContent = `tick: ${payload.tick}`;
      const rows = world.grid.map((row) => row.map(tileChar).join(''));
      gridEl.textContent = rows.join('\n');
    }

    async function refreshStatus() {
      const resp = await fetch('/status');
      const s = await resp.json();
      statusEl.textContent = [
        `tick=${s.tick}`,
        `queued=${s.queued_commands}`,
        `alive_npc=${s.alive_npc_count}`,
        `work_orders=${s.work_order_count}`,
        `replay_entries=${s.replay_log_entries}`,
        `queue_last=${s.queue_depth_last}`,
        `idle_ratio=${s.idle_npc_ratio_last}`
      ].join('\n');
    }

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.onopen = () => { connEl.textContent = 'WS: connected'; };
      ws.onclose = () => { connEl.textContent = 'WS: disconnected'; setTimeout(connectWs, 1200); };
      ws.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        if (data.type === 'delta_tick' || data.type === 'snapshot_full') {
          refreshWorld();
          refreshStatus();
        }
        if (data.result) appendLog(data);
      };
    }

    function send(payload) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        appendLog('ws not connected');
        return;
      }
      ws.send(JSON.stringify(payload));
      appendLog({sent: payload});
    }

    document.getElementById('btnBuild').onclick = () => send({
      client_command_id: `build-${randId()}`,
      type: 'Build',
      payload: { x: Number(val('x')), y: Number(val('y')), tile_type: val('tile') }
    });

    document.getElementById('btnDeconstruct').onclick = () => send({
      client_command_id: `decon-${randId()}`,
      type: 'Deconstruct',
      payload: { x: Number(val('x')), y: Number(val('y')) }
    });

    document.getElementById('btnWork').onclick = () => send({
      client_command_id: `wo-${randId()}`,
      type: 'CreateWorkOrder',
      payload: { work_type: val('workType'), location: { x: Number(val('x')), y: Number(val('y')) } }
    });

    connectWs();
    refreshWorld();
    refreshStatus();
    setInterval(refreshStatus, 1000);
  </script>
</body>
</html>
